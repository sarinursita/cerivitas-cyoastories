<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Interaktif</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:700px;width:100%;margin:0 auto}
.header{text-align:center;margin-bottom:30px;opacity:.8}
.header h1{font-size:2em;background:linear-gradient(135deg,#ff6b6b,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .scene-counter{color:#888;font-size:.9em;margin-top:5px}
.scene{display:none;animation:fadeIn .6s ease}
.scene.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scene-title{font-size:1.5em;margin-bottom:5px;color:#c084fc}
.scene-meta{font-size:.85em;color:#888;margin-bottom:20px;font-style:italic}
.narrative{font-size:1.1em;line-height:1.8;margin-bottom:30px;white-space:pre-wrap}
.narrative p{margin-bottom:15px}
.story-image-container{margin:20px 0;text-align:center}
.story-image{max-width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);border:1px solid #333}
.ending-badge{display:inline-block;background:linear-gradient(135deg,#ff6b6b,#c084fc);color:#fff;padding:8px 20px;border-radius:20px;font-weight:bold;margin-top:20px;font-size:.9em}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.choice-btn{background:linear-gradient(135deg,#1a1a3a,#1a1a4a);color:#fff;border:1px solid #333;padding:16px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;text-align:left;width:100%;font-family:inherit}
.choice-btn:hover{background:linear-gradient(135deg,#2a2a5a,#2a2a6a);border-color:#c084fc;transform:translateY(-2px);box-shadow:0 5px 20px rgba(192,132,252,.2)}
.choice-btn .arrow{color:#c084fc;margin-right:10px}
.restart-btn{background:transparent;color:#c084fc;border:1px solid #c084fc;padding:12px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;margin-top:20px;font-family:inherit}
.restart-btn:hover{background:rgba(192,132,252,.1);transform:translateY(-2px)}
@media(max-width:500px){.narrative{font-size:1em}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Cerita Interaktif</h1>
    <div class="scene-counter" id="sceneCounter"></div>
  </div>
  <div id="sceneContainer"></div>
</div>
<script>
const SCENES = ["scene1","scene2a","scene2b","scene3a","scene3b","scene4","scene5a","scene5b","scene5c"];
const story = {
  "scene1": {    title: "",    setting: "Stasiun Galaksi — Ruang Kontrol Utama — Malam hari",    karakter: "Bintang (pelajar magang, 17 tahun)",    text: `![Scene 1: Stasiun Galaksi — Sinyal dari Mars](scene01-image.png)

Malam ini jadwal jaga Bintang sendirian di ruang kontrol Stasiun Galaksi. Sepi. Hanya suara mesin dan lampu indikator yang berkedip-kedip pelan.

Tiba-tiba... **BIP... BIP... BIP.**

Alarm sinyal masuk. Bintang cek layar — ada transmisi dari arah Mars. Tapi itu mustahil. Koloni Mars sudah mati 50 tahun lalu. Semua orang tahu itu.

Bintang makin penasaran saat melihat data awal — ini bukan sinyal random. Ini sinyal terstruktur. Seperti pesan. Sengaja dikirim. **Dari Mars.**

Jantung Bintang berdebar-debar. Ini penemuan besar. Tapi juga... agak menyeramkan.`,    isEnd: false,    choices: [      {target: "scene2a", text: "Riset sinyal ini dari lab komputer, cari tahu asalnya"},      {target: "scene2b", text: "Kirim balik sinyal, jawab siapa kamu"}    ]  },  "scene2a": {    title: "",    setting: "Stasiun Galaksi — Lab Komputer",    karakter: "Bintang",    text: `![Scene 2A: Pola Detak Jantung](scene02a-image.png)

Bintang duduk di depan layar lab, mengolah data sinyal satu per satu. Matanya sudah merah karena begadang. Tapi rasa penasaran lebih kuat dari rasa kantuk.

"Ini aneh..." gumam Bintang.

Data sinyal menunjukkan pola frekuensi yang... familiar. Bintang bandingkan dengan database. Gas. Listrik. Gelombang otak manusia. **Detak jantung.**

Bintang bandingkan dengan data medis stasiun — data detak jantung kru.

Dan saat melihat layar, Bintang membeku.

Pola sinyal dari Mars itu... **sama persis dengan detak jantung Bintang sendiri**. Tepat. Semua detaknya. Iramanya. Bahkan variasi detak saat deg-degan.

*Bagaimana bisa sinyal dari Mars cocok dengan jantungku?*`,    isEnd: false,    autoChoice: true,    choices: [      {target: "scene3a", text: "Lanjutkan penelitian"}    ]  },  "scene2b": {    title: "",    setting: "Stasiun Galaksi — Ruang Komunikasi",    karakter: "Bintang",    text: `![Scene 2B: Balasan dari Mars](scene02b-image.png)

"Nekat," bisik Bintang, sebelum menekan tombol TRANSMIT.

"Siapa kamu?"

Satu kalimat pendek dari Bintang meluncur ke Mars. 5 menit. 10 menit. Bintang mulai ragu — mungkin hanya noise.

**BIP.**

Layar berkedip. Ada balasan.

Satu kata.

**"Aku."**

Bintang hampir jatuh dari kursi. *Ada yang menjawab. Dari Mars. 50 tahun setelah koloni mati!*

Dengan tangan gemetar, Bintang lanjut berkomunikasi.

"Siapa 'aku'?"

Balasannya datang lebih cepat kali ini. Bukan satu kata, tapi pesan panjang. Bintang kaget saat membaca isinya — isi pesan ini tidak mungkin diketahui orang lain.`,    isEnd: false,    autoChoice: true,    choices: [      {target: "scene3b", text: "Baca pesan selengkapnya"}    ]  },  "scene3a": {    title: "",    setting: "Stasiun Galaksi — Lab Komputer — Pagi buta",    karakter: "Bintang",    text: `![Scene 3A: DNA 99.9% Cocok](scene03a-image.png)

Bintang sudah begadang semalaman, tapi tidak peduli. Data sudah terkumpul. Dan hasilnya... tidak masuk akal.

Dia mengecek sidik jari genetik — prosedur standar untuk verifikasi asal sinyal biologis. Dan hasilnya membuat Bintang tercengang:

**Kecocokan DNA: 99.9% — SAMPLE: BINTANG — SUMBER: MARS**

"Gila..." bisik Bintang. *DNA-ku ada di Mars?!*

Bintang cek ulang. Tiga kali. Hasilnya sama.

Sinyal itu bukan dari alien. Bukan dari koloni Mars. Sinyal itu... dari seseorang yang secara genetik identik dengan Bintang.

Tapi bagaimana caranya?!

Bintang harus mencari tahu lebih lanjut. Ada yang janggal di data komunikasi — sepertinya ada informasi tambahan yang disembunyikan.`,    isEnd: false,    autoChoice: true,    choices: [      {target: "scene4", text: "Cari tahu kebenarannya"}    ]  },  "scene3b": {    title: "",    setting: "Stasiun Galaksi — Ruang Komunikasi",    karakter: "Bintang",    text: `![Scene 3B: Pesan dari Masa Depan](scene03b-image.png)

Pesan dari Mars itu panjang. Dan isinya... membuat Bintang merinding.

Bukan soal Mars. Bukan soal alien. Tapi soal **Bintang sendiri**.

Orang di ujung sana tahu nama lengkap Bintang. Tanggal lahir. Makanan favorit. Nama panggilan yang hanya ibu yang tahu. Bahkan kenangan kecil saat umur 5 tahun — kejadian yang tidak mungkin diketahui orang lain.

*KECUALI...*

"Bagaimana dia tahu semua ini?" Bintang menggenggam kursi erat-erat.

Pesan terakhirnya makin menyeramkan:

*"Kamu pasti bingung. Tapi percaya — aku tahu semua ini karena aku dulu persis seperti kamu. Aku Bintang. Bintang yang 20 tahun lebih tua."*

Darah Bintang serasa berhenti mengalir.`,    isEnd: false,    autoChoice: true,    choices: [      {target: "scene4", text: "Terima apa adanya, hadapi kenyataan"}    ]  },  "scene4": {    title: "",    setting: "Stasiun Galaksi — Kamar Pribadi Bintang",    karakter: "Bintang",    text: `![Scene 4: Pilihan Terakhir](scene04-image.png)

Bintang duduk di tepi tempat tidur, layar tablet di tangan. Semua data sudah terkumpul. Semua potongan puzzle tersambung. Dan jawabannya...

*Sinyal dari Mars itu bukan dari alien. Bukan dari koloni yang mati. Tapi dari...*

**Diri Bintang sendiri.**

Bintang versi masa depan. Yang entah bagaimana caranya terdampar di Mars. Mungkin misi rahasia. Mungkin kecelakaan. Yang jelas — Bintang masa depan sudah 10 tahun terdampar di sana. Sendirian. Menggunakan peralatan darurat koloni untuk mengirim sinyal ke masa lalu. Ke Bintang yang sekarang.

Pesan audio terakhir dari Mars mulai diputar. Suaranya... suara Bintang sendiri. Tapi lebih tua. Lebih lelah. Lebih patah.

*"Halo, diriku yang dulu. Aku tahu ini gila. Tapi aku hanya ingin bilang — aku di sini karena pilihan yang salah. Satu keputusan bodoh yang membuatku terdampar di sini. Aku kirim sinyal ini ke masa lalu... ke kamu. Tolong. Jangan ulangi kesalahanku. Aku percaya kamu bisa—"*

Pesan terputus. Statis.

Bintang dihadapkan pada pilihan.`,    isEnd: false,    choices: [      {target: "scene5a", text: "Coba komunikasi balik, tanya apa yang sebenarnya terjadi"},      {target: "scene5b", text: "Cari cara ke Mars selametin Bintang masa depan"},      {target: "scene5c", text: "Diam saja, pantau terus dari jauh"}    ]  },  "scene5a": {    title: "",    setting: "Stasiun Galaksi — Ruang Komunikasi",    karakter: "Bintang 🏁",    text: `![Scene 5A: Happy Ending — Lingkaran Waktu](scene05a-image.png)

**Status: END — SELAMAT!**

Bintang mengambil napas dalam-dalam, lalu mulai mengetik.

"Aku dengar kamu. Ceritakan semuanya."

Komunikasi intensif selama seminggu. Bintang masa depan menceritakan semua — bagaimana dia ke Mars, apa yang salah, dan apa yang harus dihindari.

Dengan informasi itu, Bintang mengubah hidupnya. Fokus ke penelitian, menjauhi risiko yang membuat Bintang masa depan terjebak.

**20 tahun kemudian...**

Bintang menjadi ilmuwan paling terkenal di generasinya. Penemuannya tentang perjalanan waktu diakui dunia.

Tapi malam ini, di puncak kariernya...

*BIP... BIP... BIP.*

Layar komunikasi berkedip. Sinyal baru.

Dari **Jupiter**.

Bintang tersenyum. *Lingkaran waktu terus berputar...*

🏁 **HAPPY ENDING** — Tapi petualangan belum selesai...`,    isEnd: true,    choices: [    ]  },  "scene5b": {    title: "",    setting: "Luar Angkasa — Pesawat Darurat",    karakter: "Bintang 🏁",    text: `![Scene 5B: Sad Ending — Pesawat Hancur](scene05b-image.png)

**Status: END — GAME OVER**

"Aku akan ke Mars."

Bintang nekat. Membajak pesawat darurat stasiun dan meluncur ke Mars sendirian. Perjalanan 3 bulan penuh risiko.

Hari ke-45... **BOOM.**

Panel oksigen meledak. Alarm meraung. Oksigen bocor perlahan.

"Tidak... tidak!" Bintang panik, mencoba memperbaiki. Tapi terlalu lambat.

Pesawat mulai hancur. Pendingin mati. Suhu turun drastis.

Di Mars, seseorang menunggu. Bintang masa depan tahu — karena dia juga pernah membuat pilihan yang sama.

Satu sinyal terakhir dikirim dari pesawat yang sekarat:

*"Maaf... aku gagal. Tapi tenang. Aku di jalan yang sama... sekarang aku akan bersamamu."*

Di permukaan Mars, Bintang masa depan memejamkan mata. Satu titik cahaya melintas di langit.

Mereka akhirnya bersatu lagi. Di Mars. Selamanya.

🏁 **SAD ENDING** — Jangan ulangi kesalahan yang sama...`,    isEnd: true,    choices: [    ]  },  "scene5c": {    title: "",    setting: "Stasiun Galaksi — Berbulan-bulan kemudian",    karakter: "Bintang 🏁",    text: `![Scene 5C: Mystery Ending — Gelang di Mars](scene05c-image.png)

**Status: END — ???**

Bintang memutuskan untuk diam saja.

Tidak menjawab. Tidak mencari cara ke Mars. Hanya memantau sinyal itu dari jauh.

3 hari kemudian... sinyalnya berhenti.`,    isEnd: true,    choices: [    ]  }};

let currentScene = "scene1";

function goTo(sceneId) {
  const scene = story[sceneId];
  if (!scene) return;
  currentScene = sceneId;
  const container = document.getElementById("sceneContainer");
  let div = document.getElementById("scene-" + sceneId);
  if (!div) {
    div = document.createElement("div");
    div.className = "scene";
    div.id = "scene-" + sceneId;
    container.appendChild(div);
  }
  let meta = [];
  if (scene.setting) meta.push("📍 " + esc(scene.setting));
  if (scene.karakter) meta.push("👤 " + esc(scene.karakter));
  let html = '<div class="scene-title">' + esc(scene.title) + '</div>';
  if (meta.length) html += '<div class="scene-meta">' + meta.join(" | ") + '</div>';
  // Render markdown -> HTML: esc first (safe), then bold/italic, then images
  let narr = esc(scene.text);
  narr = narr.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  narr = narr.replace(/\*(.+?)\*/g, "<em>$1</em>");
  // Convert markdown images to HTML (after esc so tags survive)
  narr = narr.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<div class="story-image-container"><img class="story-image" src="$2" alt="$1" loading="lazy"></div>');
  html += '<div class="narrative">' +
    narr.split("\\n\\n").map(p => '<p>' + p.replace(/\\n/g, "<br>") + '</p>').join("") +
    '</div>';
  if (scene.isEnd) {
    html += '<div class="ending-badge">🏁 THE END</div>';
  }
  if (scene.autoChoice && scene.choices.length > 0) {
    setTimeout(function() { goTo(scene.choices[0].target); }, 2500);
    html += '<p style="color:#666;font-style:italic;text-align:center;margin-top:20px">⟳ Melanjutkan...</p>';
  } else if (scene.choices.length > 0) {
    html += '<div class="choices">';
    for (let c of scene.choices) {
      html += '<button class="choice-btn" data-goto="' + c.target + '">';
      html += '<span class="arrow">➤</span> ' + esc(c.text);
      html += '</button>';
    }
    html += '</div>';
  }
  if (scene.isEnd) {
    html += '<div style="text-align:center"><button class="restart-btn" data-goto="restart">⟳ Main Lagi</button></div>';
  }
  div.innerHTML = html;
  document.querySelectorAll(".scene").forEach(el => el.classList.remove("active"));
  div.classList.add("active");
  div.style.animation = "none";
  void div.offsetHeight;
  div.style.animation = "fadeIn 0.6s ease";
  const idx = SCENES.indexOf(sceneId) + 1;
  document.getElementById("sceneCounter").textContent = "Scene " + idx + " of " + SCENES.length;
  window.scrollTo({top:0,behavior:"smooth"});
}
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
document.addEventListener("click", function(e) {
  let el = e.target;
  while (el && el !== document) {
    const g = el.getAttribute && el.getAttribute("data-goto");
    if (g === "restart") { goTo("scene1"); return; }
    if (g) { goTo(g); return; }
    el = el.parentNode;
  }
});
goTo("scene1");
</script>
</body>
</html>
