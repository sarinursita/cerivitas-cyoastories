<!DOCTYPE html>
<html lang="id">
<head>

<title>Lab Maut — Cerita Interaktif</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, #0d0d2b 0%, transparent 50%), radial-gradient(ellipse at 80% 50%, #1a0a2e 0%, transparent 50%);
  }
  .container {
    max-width: 720px;
    width: 100%;
    margin: 40px auto;
  }
  .scene-card {
    background: rgba(20, 20, 50, 0.85);
    border: 1px solid rgba(100, 100, 200, 0.2);
    border-radius: 16px;
    padding: 40px 35px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeSlide 0.6s ease-out;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .scene-num {
    background: linear-gradient(135deg, #6c4fa7, #8b6fcc);
    color: #fff;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .scene-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #c4b5fd, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .scene-meta {
    font-size: 14px;
    color: #8888aa;
    margin-bottom: 20px;
    border-left: 3px solid #6c4fa7;
    padding-left: 15px;
    line-height: 1.6;
  }
  .scene-meta strong { color: #b8b8d8; }
  .scene-text {
    font-size: 17px;
    line-height: 1.8;
    color: #d0d0e8;
    margin-bottom: 30px;
  }
  .scene-text p { margin-bottom: 15px; }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100, 100, 200, 0.3), transparent);
    margin-bottom: 25px;
  }
  .choices-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #8888aa;
    margin-bottom: 15px;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .choice-btn {
    background: rgba(30, 30, 70, 0.8);
    color: #e0e0f0;
    border: 1px solid rgba(100, 100, 200, 0.25);
    padding: 16px 22px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 16px;
    text-align: left;
    font-family: inherit;
    line-height: 1.5;
  }
  .choice-btn:hover {
    background: rgba(60, 50, 120, 0.8);
    border-color: rgba(139, 111, 204, 0.6);
    transform: translateX(5px);
    box-shadow: 0 0 20px rgba(108, 79, 167, 0.2);
  }
  .choice-btn:active { transform: translateX(2px); }
  .ending-badge {
    display: inline-block;
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: #fff;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 15px;
  }
  .restart-btn {
    display: inline-block;
    background: linear-gradient(135deg, #6c4fa7, #8b6fcc);
    color: #fff;
    border: none;
    padding: 14px 30px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    margin-top: 25px;
    transition: all 0.3s;
    font-family: inherit;
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(108, 79, 167, 0.4);
  }
  .progress-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }
  .progress-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(100, 100, 200, 0.15);
    border: 1px solid rgba(100, 100, 200, 0.2);
    transition: all 0.5s;
  }
  .progress-dot.active { background: #8b6fcc; border-color: #8b6fcc; box-shadow: 0 0 10px rgba(139, 111, 204, 0.5); }
  .progress-dot.visited { background: rgba(139, 111, 204, 0.4); border-color: rgba(139, 111, 204, 0.4); }
  .typing-cursor::after {
    content: '';
    display: inline-block;
    width: 3px;
    height: 18px;
    background: #8b6fcc;
    margin-left: 4px;
    animation: blink 1s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .scene-ending .scene-title { background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .scene-card { padding: 25px 20px; }
    .scene-title { font-size: 20px; }
    .scene-text { font-size: 15px; }
  }
</style>
</head>

const allSceneIds = ["01","02a","02b","03a","03b","04a","04b","05a","06a","06b","end01","end02","end03","end04","end05"];
const mainScenes = ["01","02a","02b","03a","03b","04a","04b","05a","06a","06b"];

let currentScene = "01";
let visited = new Set();
let history = [];

function renderScene(id) {
  const scene = story[id];
  if (!scene) return;

  currentScene = id;
  visited.add(id);
  history.push(id);

  // Progress bar
  const progressEl = document.getElementById('progress');
  progressEl.innerHTML = mainScenes.map(sid => 
    `<div class="progress-dot ${sid === id ? 'active' : visited.has(sid) ? 'visited' : ''}"></div>`
  ).join('');

  const container = document.getElementById('scene-content');

  if (scene.ending) {
    container.innerHTML = `
      <div class="scene-ending">
        <div class="scene-header">
          <span class="scene-num">🏁 ENDING</span>
        </div>
        <div class="scene-title">${scene.title}</div>
        <div class="scene-text">${scene.text}</div>
        <button class="restart-btn" onclick="restart()">🔄 Main Lagi</button>
      </div>
    `;
  } else {
    const choicesHtml = scene.choices.map((c, i) =>
      `<button class="choice-btn" onclick="goTo('${c.next}')">${c.text}</button>`
    ).join('');

    container.innerHTML = `
      <div class="scene-header">
        <span class="scene-num">Scene ${scene.num}</span>
      </div>
      <div class="scene-title">${scene.title}</div>
      <div class="scene-meta">
        <strong>Setting:</strong> ${scene.setting}<br>
        <strong>Karakter:</strong> ${scene.chars}
      </div>
      <div class="scene-text">${scene.text}</div>
      <div class="divider"></div>
      <div class="choices-label">PILIHAN</div>
      <div class="choices">${choicesHtml}</div>
    `;
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Re-trigger animation
  const card = document.querySelector('.scene-card');
  card.style.animation = 'none';
  card.offsetHeight; // force reflow
  card.style.animation = 'fadeSlide 0.6s ease-out';
}

function goTo(sceneId) {
  if (story[sceneId]) renderScene(sceneId);
}

function restart() {
  visited = new Set();
  history = [];
  renderScene("01");
}

// Start
renderScene("01");
</script>
</body>
</html>
