<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Interaktif</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:700px;width:100%;margin:0 auto}
.header{text-align:center;margin-bottom:30px;opacity:.8}
.header h1{font-size:2em;background:linear-gradient(135deg,#ff6b6b,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .scene-counter{color:#888;font-size:.9em;margin-top:5px}
.scene{display:none;animation:fadeIn .6s ease}
.scene.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scene-title{font-size:1.5em;margin-bottom:5px;color:#c084fc}
.scene-meta{font-size:.85em;color:#888;margin-bottom:20px;font-style:italic}
.narrative{font-size:1.1em;line-height:1.8;margin-bottom:30px;white-space:pre-wrap}
.narrative p{margin-bottom:15px}
.ending-badge{display:inline-block;background:linear-gradient(135deg,#ff6b6b,#c084fc);color:#fff;padding:8px 20px;border-radius:20px;font-weight:bold;margin-top:20px;font-size:.9em}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.choice-btn{background:linear-gradient(135deg,#1a1a3a,#1a1a4a);color:#fff;border:1px solid #333;padding:16px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;text-align:left;width:100%;font-family:inherit}
.choice-btn:hover{background:linear-gradient(135deg,#2a2a5a,#2a2a6a);border-color:#c084fc;transform:translateY(-2px);box-shadow:0 5px 20px rgba(192,132,252,.2)}
.choice-btn .arrow{color:#c084fc;margin-right:10px}
.restart-btn{background:transparent;color:#c084fc;border:1px solid #c084fc;padding:12px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;margin-top:20px;font-family:inherit}
.restart-btn:hover{background:rgba(192,132,252,.1);transform:translateY(-2px)}
@media(max-width:500px){.narrative{font-size:1em}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Cerita Interaktif</h1>
    <div class="scene-counter" id="sceneCounter"></div>
  </div>
  <div id="sceneContainer"></div>
</div>
<script>
const SCENES = ["scene1","scene2a","scene2b","scene3a","scene3b","scene4a","scene4b","scene5a","scene6a","scene6b"];
const story = {
  "scene1": {    title: "Misi Datang",    setting: "Markas intelijen, masa depan fiksi. Ruang briefing minimalis dengan layar holografik.",    karakter: "Xavier, Komandan",    text: `Xavier berdiri tegap di depan meja holografik. Di atasnya, data seorang perempuan — korban uji coba — berputar dalam sinar biru.

"Korban ketiga," kata Komandan datar. "Laboratorium itu... kita sebut Lab Maut. Profesor-profesor terkenal di balik temboknya. Mereka bikin pil aneh, dan orang-orang jadi kelinci percobaan."

Xavier menatap data itu. Perempuan itu jatuh meninggal beberapa detik setelah minum pil.

"Kita butuh satu sampel pil itu. Dan bukti," lanjut Komandan. "Kau yang paling bisa dipercaya, Xavier."`,    isEnd: false,    choices: [      {target: "scene2a", text: "Langsung berangkat — gas pol, ga pake persiapan"},      {target: "scene2b", text: "Riset dulu soal lab"}    ]  },  "scene2a": {    title: "Nyusup ke Lab (Langsung)",    setting: "Laboratorium — gedung tinggi, dinding putih, lorong-lorong steril dengan lampu neon kedap-kedip. Malam hari.",    karakter: "Xavier",    text: `Xavier melompat pagar belakang lab tanpa suara. Tanpa persiapan, dia hanya modal naluri dan peralatan standar.

Lorong lab sepi. Terlalu sepi. Langkah kakinya menggema di ubin putih. Di kejauhan, terdengar suara mesin berderu rendah.

Tiba-tiba — langkah kaki dari ujung lorong. Xavier menyempit ke balik pintu. Dua orang staff lab lewat, ngobrol pelan.

"Kata Profesor, pil M-7 udah siap di ruang 4."

"Siap-siap aja. Besok uji coba lagi."

Xavier menunggu mereka pergi. Ruang 4, ya?`,    isEnd: false,    choices: [      {target: "scene3a", text: "Cari jalan ke ruang 4 lewat pintu belakang"},      {target: "scene3b", text: "Ikuti staffnya, nyamar nimbrung"}    ]  },  "scene2b": {    title: "Nyusup ke Lab (Riset Dulu)",    setting: "Laboratorium — gedung tinggi, lorong steril. Xavier udah pelajari denah selama 2 jam.",    karakter: "Xavier",    text: `Berkat riset, Xavier tau persis: ventilasi di lantai 2, jadwal shift staff, dan kamera buta di sayap timur.

Dia masuk lewat pintu samping — persis 7 menit setelah pergantian shift. Denah lab udah di kepala.

Lorong sepi. Tapi Xavier nemuin sesuatu yang ganjil: ada lenceng staff tergeletak di lantai. Masih hangat. Kayak baru aja dipake.

"Pasti ada yang baru lewat," gumamnya.

Dari ujung lorong, terdengar suara pintu metal dibuka. Xavier sigap.`,    isEnd: false,    choices: [      {target: "scene3a", text: "Jalan lewat jalur ventilasi — lebih lambat"},      {target: "scene3b", text: "Pake lenceng staff buat nyamar masuk — cepat"}    ]  },  "scene3a": {    title: "Nemuin Pil Aneh (Pintu Belakang)",    setting: "Ruang penyimpanan di belakang lab. Suhu dingin, rak-rak logam penuh botol kimia. Hanya satu lampu darurat menyala.",    karakter: "Xavier",    text: `Xavier masuk lewat lorong belakang — persis di belakang ruang 4. Lewat celah pintu, dia liat meja kaca penuh alat lab.

Dan di tengah meja: satu botol kecil. Label merah bertuliskan **M-7**.

Xavier mengintip. Di luar, dua profesor lagi diskusi.

"Efek sampingnya masih belum stabil," kata satu suara.

"Toh korban ga bakal ngadu," jawab yang lain, dingin.

Xavier menunggu mereka pergi. Botol M-7 ada di depannya. Di sebelahnya ada dokumen riset.`,    isEnd: false,    choices: [      {target: "scene4a", text: "Ambil 1 pil aja — cepat"},      {target: "scene4b", text: "Ambil beberapa pil + dokumennya"}    ]  },  "scene3b": {    title: "Nemuin Pil Aneh (Nyamar Staff)",    setting: "Ruang penelitian utama Lab Maut. Besar, modern, penuh monitor. Para profesor sibuk di depan data.",    karakter: "Xavier, Profesor Alpha, Profesor Beta",    text: `Xavier pake lenceng staff dan jalan percaya diri. Jantungnya deg-degan, tapi wajahnya datar — profesional dingin banget.

"Kamu staff baru?" tegur seseorang.

Xavier menoleh. Seorang profesor tua dengan kacamata tebal menatapnya curiga.

"Aku dari divisi logistik," jawab Xavier tenang. "Ada permintaan cek suhu ruang penyimpanan."

Profesor itu mengernyit, lalu mengangguk malas. "Cepetan. Ruang 4. Jangan ganggu riset."

Xavier melenggang ke ruang 4. Di dalam, botol M-7 terpajang di lemari pendingin. Tapi ada alarm kecil di gagangnya.`,    isEnd: false,    choices: [      {target: "scene4a", text: "Ambil 1 pil aja"},      {target: "scene4b", text: "Ambil beberapa pil + ambil dokumen di meja"}    ]  },  "scene4a": {    title: "Pusing di Markas (Hati-hati)",    setting: "Markas intelijen, ruang pribadi Xavier. Malam hari.",    karakter: "Xavier",    text: `Xavier kembali ke markas dengan satu pil M-7 aman di kantong. Misi berhasil.

Tapi tiba-tiba... kepalanya pusing. Pandangan berkunang-kunang.

Xavier terhuyung ke meja. Jari-jarinya gemetar. "Sial... penyakit lamaku kambuh," gumamnya.

Dia merogoh saku jaket — tempat obat sakit kepalanya. Tapi di saku yang sama, ada pil M-7 yang baru dia ambil. Keduanya hampir identik: bulat, putih, tanpa label.

Xavier mengerjap. Pandangan makin kabur. Dia harus cepet minum obat...`,    isEnd: false,    choices: [      {target: "scene5a", text: "Langsung minum obat dari kantong — buru-buru"}    ]  },  "scene4b": {    title: "Pusing di Markas (Bawa Banyak Bukti)",    setting: "Markas intelijen, ruang pribadi Xavier. Malam hari.",    karakter: "Xavier",    text: `Xavier kembali dengan 3 pil M-7 dan setumpuk dokumen riset. Misi besar.

Tapi di tengah perjalanan, kepalanya mendadak pusing berat. Penyakit lamanya kumat.

Xavier jatuh ke kursi, merogoh saku. Di dalamnya: pil M-7 dan obat sakit kepalanya — sama persis bentuknya.

"Mana yang mana...?" bisiknya, mata udah berkunang.

Waktu terasa berhenti. Tangan Xavier meraba-raba di antara dua pil yang identik. Salah satu bisa nyelamatin dia. Yang satunya... bisa kirim dia ke dunia yang ga dikenal.`,    isEnd: false,    choices: [      {target: "scene5a", text: "Minum aja, ga ada waktu mikir"}    ]  },  "scene5a": {    title: "Bangun di Dunia Lain",    setting: "Dunia lain — langit ungu, tanah hitam berkilau, pepohonan transparan seperti kaca. Udara dingin dan tipis.",    karakter: "Xavier",    text: `**

Xavier membuka mata. Langit ungu menyambutnya.

"Haah?!"

Dia bangun. Badannya ringan. Pusing hilang. Tapi ini... bukan markas. Bukan lab. Bukan tempat yang dia kenal.

Di kejauhan, ada dua jalur:
- **Timur:** Cahaya hangat, keemasan, seperti matahari terbit.
- **Barat:** Gelap pekat, tapi ada semacam denyut cahaya ungu di dalamnya.

Xavier menepuk kantongnya. Pil M-7 masih ada. Dan selembar kertas robek dari dokumen lab — entah gimana caranya ikut.

"Jadi... ini efek pil M-7?" gumamnya.

Suara aneh berdesir di angkasa. Udara bergetar. Xavier harus memilih.`,    isEnd: false,    choices: [      {target: "scene6a", text: "Jalan ke arah cahaya — penasaran, mungkin ada jawaban"},      {target: "scene6b", text: "Jalan ke arah gelap — nyali besar, mau liat sisi lain dunia ini"}    ]  },  "scene6a": {    title: "Eksplorasi — Cahaya",    setting: "Dunia cahaya — hamparan emas, bangunan-bangunan transparan seperti kristal. Tenang, tapi ada yang disembunyikan.",    karakter: "Xavier",    text: `**

Xavier berjalan menuju cahaya. Semakin dekat, suasananya makin hangat. Tapi ada bunyi aneh — seperti bisikan.

"Itu... suara manusia?"

Di tengah hamparan emas, Xavier melihat mereka: para korban uji coba. Termasuk perempuan yang mati di lab. Mereka ada di sini — sebagai bayangan tembus pandang, seperti hologram.

"Kau... salah satu dari mereka?" tanya bayangan itu.

Xavier kaget. Dia bisa diajak ngomong.

Bayangan itu menatapnya sedih. "Pil M-7 bukan obat. Ini portal. Profesor mengirim kami ke sini... untuk jadi sumber energi dunia ini."

Xavier mengepalkan tangan. Rahasia profesor terbongkar. Tapi sekarang dia ada di sini, di dunia lain. Mau apa?`,    isEnd: false,    choices: [    ]  },  "scene6b": {    title: "Eksplorasi — Gelap",    setting: "Dunia gelap — langit hitam dengan kilau ungu, tanah berbatu, suara deru mesin dari dalam perut bumi.",    karakter: "Xavier",    text: `**

Xavier melangkah ke kegelapan. Semakin dalam, semakin terasa... familiar.

"Tempat ini..." bisiknya.

Di tengah kegelapan, ada singgasana besar dari kristal hitam. Dan di atasnya — sesosok bayangan duduk, menunggu.

"Akhirnya kau datang, Xavier."

Suara itu... Xavier pernah denger sebelumnya. Bayangan itu berdiri. Wajahnya — samar, tapi Xavier bisa lihat — mirip seseorang.

"Aku adalah Profesor yang kau cari. Tapi bukan yang di dunia realitas." Bayangan itu tersenyum. "Aku versi dia yang berhasil kabur ke sini. Dan kau... kau jatuh ke perangkapnya."

Xavier terdiam. Jadi profesor udah pernah ke sini sebelumnya?`,    isEnd: false,    choices: [    ]  }};

let currentScene = "scene1";

function goTo(sceneId) {
  const scene = story[sceneId];
  if (!scene) return;
  currentScene = sceneId;

  const container = document.getElementById("sceneContainer");
  let div = document.getElementById("scene-" + sceneId);
  if (!div) {
    div = document.createElement("div");
    div.className = "scene";
    div.id = "scene-" + sceneId;
    container.appendChild(div);
  }

  let meta = [];
  if (scene.setting) meta.push("📍 " + esc(scene.setting));
  if (scene.karakter) meta.push("👤 " + esc(scene.karakter));

  let html = '<div class="scene-title">' + esc(scene.title) + '</div>';
  if (meta.length) html += '<div class="scene-meta">' + meta.join(" | ") + '</div>';

  // Format narrative: bold, italic, paragraphs
  let narr = scene.text;
  narr = narr.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  narr = narr.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html += '<div class="narrative">' +
    narr.split("\n\n").map(p => '<p>' + esc(p).replace(/\n/g, "<br>") + '</p>').join("") +
    '</div>';

  if (scene.isEnd) {
    html += '<div class="ending-badge">🏁 THE END</div>';
  }

  // Auto-advance for merge scenes
  if (scene.autoChoice && scene.choices.length > 0) {
    setTimeout(function() { goTo(scene.choices[0].target); }, 2500);
    // Still show a brief indicator
    html += '<p style="color:#666;font-style:italic;text-align:center;margin-top:20px">⟳ Melanjutkan...</p>';
  } else if (scene.choices.length > 0) {
    html += '<div class="choices">';
    for (let c of scene.choices) {
      html += '<button class="choice-btn" data-goto="' + c.target + '">';
      html += '<span class="arrow">➤</span> ' + esc(c.text);
      html += '</button>';
    }
    html += '</div>';
  }

  if (scene.isEnd) {
    html += '<div style="text-align:center"><button class="restart-btn" data-goto="restart">⟳ Main Lagi</button></div>';
  }

  div.innerHTML = html;

  document.querySelectorAll(".scene").forEach(el => el.classList.remove("active"));
  div.classList.add("active");
  div.style.animation = "none";
  void div.offsetHeight;
  div.style.animation = "fadeIn 0.6s ease";

  const idx = SCENES.indexOf(sceneId) + 1;
  document.getElementById("sceneCounter").textContent = "Scene " + idx + " of " + SCENES.length;
  window.scrollTo({top:0,behavior:"smooth"});
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Event delegation
document.addEventListener("click", function(e) {
  let el = e.target;
  while (el && el !== document) {
    const g = el.getAttribute && el.getAttribute("data-goto");
    if (g === "restart") { goTo("scene1"); return; }
    if (g) { goTo(g); return; }
    el = el.parentNode;
  }
});

goTo("scene1");
</script>
</body>
</html>
