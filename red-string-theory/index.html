    narrative: `**SELAMAT — ENDING D: MULAI DARI AWAL**

    is_ending: true,

const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];

function getEndingType(id) {
  if (id.includes('7A') || id.includes('good')) return 'good';
  if (id.includes('7B') || id.includes('bad')) return 'bad';
  if (id.includes('7C') || id.includes('twist') || id.includes('plot')) return 'twist';
  return 'twist';
}

function goTo(sceneId) {
  if (sceneId === 'restart' || sceneId === 'Restart') {
    goTo('01');
    return;
  }

  const scene = story[sceneId];
  if (!scene) {
    document.getElementById('narrative').innerHTML = '<p>Scene belum tersedia.</p>';
    return;
  }

  document.getElementById('scene-number').textContent = 'Scene ' + sceneId.toUpperCase();
  document.getElementById('scene-title').textContent = scene.title;

  let metaHtml = '';
  if (scene.setting) metaHtml += '<span>📍 ' + scene.setting + '</span>';
  if (scene.chars) metaHtml += '<span>👤 ' + scene.chars + '</span>';
  document.getElementById('scene-meta').innerHTML = metaHtml;
  let narr = scene.narrative;
  narr = narr.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  narr = narr.replace(/\*(.+?)\*/g, '<em>$1</em>');
  narr = narr.replace(/\n/g, '<br>');
  document.getElementById('narrative').innerHTML = '<p>' + narr.split('\n\n').join('</p><p>') + '</p>';

  const choicesDiv = document.getElementById('choices');
  const choicesLabel = document.getElementById('choices-label');
  const endingSection = document.getElementById('ending-section');

  choicesDiv.innerHTML = '';
  endingSection.innerHTML = '';

  if (scene.is_ending) {
    choicesLabel.style.display = 'none';
    let badgeClass = 'ending-twist';
    let badgeText = '🎭 PLOT TWIST ENDING';
    const etype = getEndingType(sceneId);
    if (etype === 'good') { badgeClass = 'ending-good'; badgeText = '✅ GOOD ENDING'; }
    else if (etype === 'bad') { badgeClass = 'ending-bad'; badgeText = '💀 BAD ENDING'; }

    // FIX: Use DOM API instead of innerHTML with onclick string.
    // innerHTML with onclick="goTo('...')" causes SyntaxError: Unexpected number
    // because quote escaping between Python f-string → HTML → JS is unreliable.
    endingSection.innerHTML = '<div class="ending-badge ' + badgeClass + '">' + badgeText + '</div>';
    const rstBtn = document.createElement('button');
    rstBtn.className = 'restart-btn';
    rstBtn.textContent = '🔄 Main Lagi dari Awal';
    rstBtn.onclick = function() { goTo('01'); };
    endingSection.appendChild(rstBtn);
  } else {
    choicesLabel.style.display = 'block';
    // Auto-advance for merge scenes (auto_choice flag or single choice)
    if (scene.auto_choice || (scene.choices.length === 1 && scene.choices[0].target !== 'restart')) {
      setTimeout(function() {
        goTo(scene.choices[0].target);
      }, 2500);
      return;  // Don't render buttons for auto scenes
    }
    scene.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = '<span class="choice-num">' + (letters[i] || (i+1)) + '</span>' + choice.desc;
      btn.onclick = function() { goTo(choice.target); };
      choicesDiv.appendChild(btn);
    });
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

goTo('01');
</script>
