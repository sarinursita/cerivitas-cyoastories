<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYOA Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #fef6fb; --text: #5d3a5c; --accent1: #f48fb1; --accent2: #ce93d8; --accent3: #9575cd;
  --card-bg: #fff0f5; --choice-bg: rgba(244,143,177,0.1); --choice-border: rgba(244,143,177,0.3);
  --choice-hover: rgba(244,143,177,0.2); --choice-text: #c95a7a;
  --setting: #9e7a9e; --meta: #999; --border: rgba(100,70,120,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Merriweather',Georgia,serif; background:var(--bg1); color:var(--text);
  min-height:100vh; line-height:1.8; transition:background 0.3s,color 0.3s;
}
.header-bar {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  padding: 0.7rem 1.2rem; display: flex; justify-content: space-between; align-items: center;
  font-family:'Inter',sans-serif; position: sticky; top: 0; z-index: 50;
}
.header-bar a { color: var(--meta); text-decoration: none; font-size: 0.85rem; }
.header-bar a:hover { color: var(--accent1); }
.header-bar select {
  padding:0.3rem 0.5rem; border-radius:6px; background:var(--bg1);
  border:1px solid var(--border); color:var(--text); font-size:0.75rem;
  font-family:'Inter',sans-serif; cursor:pointer; outline:none;
}
.container { max-width:700px; margin:0 auto; padding:1.5rem 1.2rem 4rem; }

.scene-label { display:inline-flex; background:rgba(244,143,177,0.1); border:1px solid var(--choice-border); color:var(--accent1); font-family:'Inter',sans-serif; font-size:0.75rem; font-weight:600; padding:0.25rem 0.7rem; border-radius:20px; margin-bottom:1.5rem; }
.scene-title { font-family:'Inter',sans-serif; font-size:1.8rem; font-weight:800; color:var(--accent3); margin-bottom:0.5rem; }
.setting { color:var(--setting); font-size:0.9rem; font-style:italic; border-left:3px solid rgba(149,117,205,0.4); padding-left:1rem; margin-bottom:1.5rem; }
.story-text p { margin-bottom:1rem; }
.story-text em { color:#b8a0d8; }
.story-text strong { color:var(--accent1); }
hr.divider { border:none; height:1px; background:linear-gradient(90deg,transparent,rgba(149,117,205,0.3),transparent); margin:2rem 0; }
.choices-label { font-family:'Inter',sans-serif; font-size:0.9rem; color:var(--accent1); font-weight:600; margin-bottom:1rem; }
.choice { display:block; background:var(--choice-bg); border:1px solid var(--choice-border); border-radius:12px; padding:1rem 1.2rem; margin-bottom:0.8rem; color:var(--choice-text); text-decoration:none; cursor:pointer; transition:0.3s; font-family:'Inter',sans-serif; font-weight:600; font-size:0.95rem; }
.choice:hover { background:var(--choice-hover); border-color:var(--accent3); transform:translateX(6px); box-shadow:0 4px 20px rgba(149,117,205,0.15); }
.choice .scene-tag { font-size:0.7rem; color:#888; font-weight:400; display:block; margin-top:0.3rem; }
.end-badge { text-align:center; font-family:'Inter',sans-serif; font-size:1.5rem; font-weight:800; color:var(--accent1); margin:2rem 0 1rem; }
.end-note { text-align:center; color:#888; font-style:italic; margin-bottom:2rem; }
.restart-btn { display:inline-block; background:rgba(244,143,177,0.1); border:1px solid var(--choice-border); color:var(--accent1); font-family:'Inter',sans-serif; font-weight:600; padding:0.8rem 2rem; border-radius:50px; cursor:pointer; transition:0.3s; }
.restart-btn:hover { background:rgba(244,143,177,0.2); }
.story-start { text-align:center; padding-top:3rem; }
.story-start h1 { font-size:2.2rem; font-weight:800; color:var(--accent1); margin-bottom:0.3rem; }
.story-start .meta-line { color:var(--meta); font-size:0.85rem; font-family:'Inter',sans-serif; margin-bottom:0.3rem; }
.story-start .premise { color:var(--setting); max-width:500px; margin:1.5rem auto; line-height:1.8; font-style:italic; }
#loading { text-align:center; padding:4rem 0; color:var(--meta); }
.story-nav-info { color:var(--meta); font-size:0.8rem; text-align:center; margin-top:1rem; font-style:italic; }
</style>
</head>
<body>
<div class="header-bar top-0 z-50">
  <a href="./">← Index Cerita</a>
  <select id="themeSelect">
    <option value="kawaii">🌸 Kawaii</option>
    <option value="dark">🌙 Dark</option>
    <option value="light">☀️ Light</option>
    <option value="forest">🌿 Forest</option>
    <option value="ocean">🌊 Ocean</option>
    <option value="fire">🔥 Fire</option>
  </select>
</div>
<div class="container">
  <div id="loading">Pilih cerita dari Index 🔙</div>
  <div id="story-start"></div>
  <div id="scene-view"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const storyParam = params.get('story');
const RAW = 'https://raw.githubusercontent.com/sarinursita/cerivitas-cyoastories/main/';

const THEMES = {
  kawaii: {'--bg1':'#fef6fb','--text':'#5d3a5c','--accent1':'#f48fb1','--accent2':'#ce93d8','--accent3':'#9575cd','--card-bg':'#fff0f5','--choice-bg':'rgba(244,143,177,0.1)','--choice-border':'rgba(244,143,177,0.3)','--choice-hover':'rgba(244,143,177,0.2)','--choice-text':'#c95a7a','--setting':'#9e7a9e','--meta':'#999','--border':'rgba(100,70,120,0.12)'},
  dark: {'--bg1':'#0c0c1e','--text':'#e0d8f0','--accent1':'#ffd700','--accent2':'#ff7eb3','--accent3':'#7ec8e3','--card-bg':'#1a1a3e','--choice-bg':'rgba(126,200,227,0.08)','--choice-border':'rgba(126,200,227,0.2)','--choice-hover':'rgba(126,200,227,0.15)','--choice-text':'#a8e6cf','--setting':'#a898c0','--meta':'#666','--border':'rgba(255,255,255,0.06)'},
  light: {'--bg1':'#f5f0ff','--text':'#1a1030','--accent1':'#c89600','--accent2':'#d44a7a','--accent3':'#3a8ba8','--card-bg':'#ffffff','--choice-bg':'rgba(58,139,168,0.06)','--choice-border':'rgba(58,139,168,0.2)','--choice-hover':'rgba(58,139,168,0.1)','--choice-text':'#2a6a8a','--setting':'#5a5080','--meta':'#888','--border':'rgba(0,0,0,0.08)'},
  forest: {'--bg1':'#0a1a10','--text':'#d0e8d0','--accent1':'#7bc96f','--accent2':'#f0a030','--accent3':'#5ab88a','--card-bg':'#0f2a1a','--choice-bg':'rgba(90,184,138,0.08)','--choice-border':'rgba(90,184,138,0.2)','--choice-hover':'rgba(90,184,138,0.15)','--choice-text':'#8cd4a0','--setting':'#889a80','--meta':'#556','--border':'rgba(255,255,255,0.06)'},
  ocean: {'--bg1':'#0a1025','--text':'#d0d8f0','--accent1':'#4fc3f7','--accent2':'#e040fb','--accent3':'#80deea','--card-bg':'#0f1a3a','--choice-bg':'rgba(128,222,234,0.08)','--choice-border':'rgba(128,222,234,0.2)','--choice-hover':'rgba(128,222,234,0.15)','--choice-text':'#80c8d0','--setting':'#8890a8','--meta':'#556','--border':'rgba(255,255,255,0.06)'},
  fire: {'--bg1':'#1a0808','--text':'#f0d0c0','--accent1':'#ff6b35','--accent2':'#ffd700','--accent3':'#ff8c42','--card-bg':'#221010','--choice-bg':'rgba(255,107,53,0.08)','--choice-border':'rgba(255,107,53,0.2)','--choice-hover':'rgba(255,107,53,0.15)','--choice-text':'#ffaa70','--setting':'#a08070','--meta':'#665','--border':'rgba(255,255,255,0.06)'}
};

const sel = document.getElementById('themeSelect');
sel.onchange = () => { applyTheme(sel.value); localStorage.setItem('cyoa-theme', sel.value); };
function applyTheme(name) {
  const root = document.documentElement;
  for (const [k,v] of Object.entries(THEMES.kawaii)) root.style.removeProperty(k);
  root.style.setProperty('--bg1','#fef6fb'); root.style.setProperty('--text','#5d3a5c');
  const t = THEMES[name]; if (t) for (const [k,v] of Object.entries(t)) root.style.setProperty(k, v);
}

const CB = '?t=' + Date.now();
async function fetchText(url) { const r=await fetch(url+CB); if(!r.ok)throw Error(); return await r.text(); }

async function loadStory(folder) {
  document.getElementById('loading').style.display = 'none';
  const md = await fetchText(RAW + folder + '/index.md');
  const title = (md.match(/^# (.+)$/m)||[])[1] || folder;
  const author = (md.match(/\*\*Penulis:\*\*\s*(.+)/)||[])[1] || '';
  const genre = (md.match(/\*\*Genre:\*\*\s*(.+)/)||[])[1] || '';
  const tags = ((md.match(/\*\*Tags:\*\*\s*(.+)/)||[])[1]||'').replace(/\*+/g,'').split(',').map(s=>s.trim()).filter(Boolean);
  const rating = (md.match(/\*\*Rating:\*\*\s*(.+)/)||[])[1] || '';
  const premise = (md.match(/\*\*Premis:\*\*\s*(.+)/)||[])[1] || '';
  const theme = (md.match(/\*\*Theme:\*\*\s*(.+)/)||[])[1] || '';

  if (theme && THEMES[theme]) { sel.value = theme; applyTheme(theme); }

  const icons = {'sci-fi':'🚀','mystery':'🔍','fantasy':'🧙','horror':'👻','adventure':'🏔️','romance':'💕','comedy':'😄'};
  const icon = icons[(genre||'').toLowerCase()] || '📖';

  window.activeStory = folder;
  document.getElementById('story-start').innerHTML = `
    <div class="story-start">
      <h1>${icon} ${title}</h1>
      <p class="meta-line">${[author, genre, rating].filter(Boolean).join(' · ')}</p>
      ${premise ? `<p class="premise">“${premise}”</p>` : ''}
      <a class="restart-btn" onclick="loadScene('scene-01')">🚀 Mulai Petualangan</a>
    </div>`;
  document.getElementById('scene-view').innerHTML = '';
}

async function fetchMD(name) {
  const cb = '?t=' + Date.now();
  let url = RAW + window.activeStory + '/' + name + '.md' + cb;
  let r = await fetch(url);
  if (r.ok) return await r.text();
  const upper = name.replace(/[a-z]+$/, s=>s.toUpperCase());
  if (upper !== name) {
    url = RAW + window.activeStory + '/' + upper + '.md' + cb;
    r = await fetch(url);
    if (r.ok) return await r.text();
  }
  throw new Error('Cannot load ' + name);
}

function sceneLabelToFilename(label) {
  let n = label.toLowerCase().trim().replace(/^scene\s+/,'').replace(/\s+/g,'-');
  n = n.replace(/^(\d)([a-z])$/,'0$1$2').replace(/^(\d)$/,'0$1');
  return 'scene-' + n;
}

async function loadScene(sceneFile) {
  const md = await fetchMD(sceneFile);
  const title = (md.match(/^# (.+)$/m)||[])[1] || sceneFile;
  const setting = (md.match(/\*\*Setting:\*\*\s*(.+?)(?:\n|$)/)||[])[1] || '';
  const karakter = (md.match(/\*\*Karakter:\*\*\s*(.+?)(?:\n|$)/)||[])[1] || '';
  const sections = md.split(/^---\s*$/m);
  let storyMD, choicesSection;
  if (sections.length >= 3) { storyMD = sections.slice(1,-1).join('\n---\n'); choicesSection = sections[sections.length-1]; }
  else if (sections.length === 2) { storyMD = sections[0]; choicesSection = sections[1]; }
  else { storyMD = sections[0]; choicesSection = ''; }
  storyMD = storyMD.replace(/^\*\*(Setting|Karakter|Penulis|Genre|Premis|Tags|Rating|Theme|Date|Plot twist|Jumlah scene):\*\*.*$/gm,'').trim();
  choicesSection = choicesSection.replace(/\*\*Pilihan:\*\*/g,'').trim();


  const choices = [];
  const re = /-\s*\[(.+?)\]\s*:\s*(.+)/g; let m;
  while ((m = re.exec(choicesSection)) !== null) {
    const label = m[1].trim(); const text = m[2].replace(/\*\*/g,'').trim();
    const curNum = parseInt(sceneFile.replace('scene-',''),10)||1;
    if (/^[A-Z]$/.test(label)) {
      const nextStr = (curNum+1)<10?'0'+(curNum+1):''+(curNum+1);
      const suffix = 'abcdef'.charAt(label.charCodeAt(0)-65);
      choices.push({file:'scene-'+nextStr+suffix, text, label});
    } else { choices.push({file:sceneLabelToFilename(label), text, label}); }
  }
  if (!choices.length) {
    while ((m = re.exec(md)) !== null) {
      const label = m[1].trim(); const text = m[2].replace(/\*\*/g,'').trim();
      const curNum = parseInt(sceneFile.replace('scene-',''),10)||1;
      if (/^[A-Z]$/.test(label)) {
        choices.push({file:'scene-'+(curNum<9?'0'+(curNum+1):''+(curNum+1))+'abcdef'.charAt(label.charCodeAt(0)-65), text, label});
      } else { choices.push({file:sceneLabelToFilename(label), text, label}); }
    }
  }

  const isEnding = md.includes('**Status:** END') || md.includes('🏁');
  const sceneNum = sceneFile.replace('scene-','').toUpperCase();

  document.getElementById('story-start').innerHTML = '';
  let html = `<p class="scene-label">📖 ${sceneNum}</p>`;
  if (isEnding) {
    html += `<h2 class="scene-title" style="color:var(--accent2)">${title}</h2><div class="story-text">${mdToHTML(storyMD)}</div><div class="end-badge">🏁 THE END</div>${choices.length?`<p class="end-note">${choices[0].text}</p>`:''}<div style="text-align:center;margin-top:2rem"><a class="restart-btn" onclick="loadScene('scene-01')">🔄 Mulai dari Awal</a></div>`;
  } else {
    const setParts = [setting, karakter].filter(Boolean);
    html += `<h2 class="scene-title">${title}</h2>${setParts.length?`<p class="setting">${setParts.join('<br>')}</p>`:''}<div class="story-text">${mdToHTML(storyMD)}</div>`;
    if (choices.length) {
      html += `<hr class="divider"><p class="choices-label">⚡ Pilih langkahmu:</p>`;
      choices.forEach(c => { html += `<a class="choice" onclick="loadScene('${c.file}')">${c.text}<span class="scene-tag">${c.label}</span></a>`; });
    }
  }
  document.getElementById('scene-view').innerHTML = html;
  window.scrollTo(0,0);
}

function mdToHTML(text) {
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/!\[(.*?)\]\((.*?)\)/g,(m,alt,src)=>'<img src="'+RAW+(window.activeStory||'')+'/'+src+'" alt="'+alt+'" style="max-width:100%;border-radius:8px;margin:1rem 0" onerror="this.remove()">');
  return h.split(/\n\n+/).map(p => { p=p.trim(); if(!p||p.startsWith('<h')||p.startsWith('<hr')) return p; return '<p>'+p.replace(/\n/g,'<br>')+'</p>'; }).join('\n');
}

// Init
const saved = localStorage.getItem('cyoa-theme') || 'kawaii';
sel.value = saved; applyTheme(saved);
if (storyParam) loadStory(storyParam);
else document.getElementById('loading').innerHTML = 'Belum ada cerita dipilih. <a href=\"./\" style=\"color:var(--accent1)\">Kembali ke Index</a>';
</script>
</body>
</html>
