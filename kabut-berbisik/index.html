<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Interaktif</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:700px;width:100%;margin:0 auto}
.header{text-align:center;margin-bottom:30px;opacity:.8}
.header h1{font-size:2em;background:linear-gradient(135deg,#ff6b6b,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .scene-counter{color:#888;font-size:.9em;margin-top:5px}
.scene{display:none;animation:fadeIn .6s ease}
.scene.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scene-title{font-size:1.5em;margin-bottom:5px;color:#c084fc}
.scene-meta{font-size:.85em;color:#888;margin-bottom:20px;font-style:italic}
.narrative{font-size:1.1em;line-height:1.8;margin-bottom:30px;white-space:pre-wrap}
.narrative p{margin-bottom:15px}
.ending-badge{display:inline-block;background:linear-gradient(135deg,#ff6b6b,#c084fc);color:#fff;padding:8px 20px;border-radius:20px;font-weight:bold;margin-top:20px;font-size:.9em}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.choice-btn{background:linear-gradient(135deg,#1a1a3a,#1a1a4a);color:#fff;border:1px solid #333;padding:16px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;text-align:left;width:100%;font-family:inherit}
.choice-btn:hover{background:linear-gradient(135deg,#2a2a5a,#2a2a6a);border-color:#c084fc;transform:translateY(-2px);box-shadow:0 5px 20px rgba(192,132,252,.2)}
.choice-btn .arrow{color:#c084fc;margin-right:10px}
.restart-btn{background:transparent;color:#c084fc;border:1px solid #c084fc;padding:12px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;margin-top:20px;font-family:inherit}
.restart-btn:hover{background:rgba(192,132,252,.1);transform:translateY(-2px)}
@media(max-width:500px){.narrative{font-size:1em}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Cerita Interaktif</h1>
    <div class="scene-counter" id="sceneCounter"></div>
  </div>
  <div id="sceneContainer"></div>
</div>
<script>
const SCENES = ["scene1","scene2a","scene2b","scene3a","scene3b","scene4","scene5a","scene5b","scene6a","scene6b"];
const story = {
  "scene1": {    title: "Kabut Pertama",    setting: "Kampung terpencil di pegunungan, sore hari menjelang maghrib",    karakter: "Junior",    text: `![Scene 1: Kabut Pertama](scene1-image.png)

Junior baru pulang dari warung. Langit pun sudah mulai gelap, tapi yang membuat dia berhenti melangkah, ada kabut tebal turun dari atas gunung. Turunnya cepet sekali. Dalam 5 menit, kampung mulai terselimut oleh kabut.

Tapi yang aneh, kabutnya berhenti tepat di pinggir kampung antara kampung dan gunung ada batas yang rapi seperti ada tembok kaca.

Junior manggut-manggut.

"Baru liat kabut kayak gini..."

Terus dari dalam kabut terdengar suara bisik-bisik samar.

Junior menengok kanan-kiri tetapi tidak ada orang, suara itu masih terdengar seperti ada yang memanggil namanya.

"Juuunior..."`,    isEnd: false,    choices: [      {target: "scene2a", text: "Selidiki kabut sendirian"},      {target: "scene2b", text: "Ajak temen buat nyelidikin bareng"}    ]  },  "scene2a": {    title: "Sendirian di Kabut",    setting: "Pinggir kabut, kampung pegunungan",    karakter: "Junior",    text: `Junior ngatur napas. Kakinya maju pelan-pelan ke arah kabut. Dingin. Udara di dekat kabut berasa beda — kayak masuk kulkas raksasa.

"Hello?" bisik Junior.

Kabutnya bergerak. Pelan, tapi kayak ngasih jalan. Ada lorong kecil di antara kabut tebal. Lorong yang cuma muat satu orang.

Bisikan itu kedengeran lagi. Lebih jelas sekarang: "Masuk... Jangan takut..."

Junior nengok ke belakang. Rumah-rumah udah jauh. Kampung kelihatan sunyi, kayak semua orang pada diem di rumah masing-masing.`,    isEnd: false,    choices: [      {target: "scene3a", text: "Masuk lebih dalam ke lorong kabut"},      {target: "scene3b", text: "Lari pulang... tapi kabut udah nutup jalan"}    ]  },  "scene2b": {    title: "Berdua Ngintip dari Jauh",    setting: "Pinggir kampung, sore-sore mau maghrib",    karakter: "Junior, David (temen sekelas)",    text: `Junior narik tangan David, anak sebangkunya yang lagi main di pos ronda.

"Dav, liat tuh!" tunjuk Junior ke kabut.

David melotot. "Itu apaan? Kok tebel amat?"

"Aneh," kata Junior. "Itu... bisikin aku tadi."

David nengok ke Junior, mukanya pucet. "Bisik? Yang bisik?"

Tiba-tiba, kabut bergerak. Dikit. Kaya ada yang jalan di dalemnya. David refleks tarik tangan Junior buat cabut. Tapi Junior nahan.

"Bentar, Dav. Kita liat dulu dari sini."`,    isEnd: false,    choices: [      {target: "scene3a", text: "Mendekat pelan-pelan buat liat lebih jelas"},      {target: "scene3b", text: "Balik badan, lapor orang dewasa"}    ]  },  "scene3a": {    title: "Kabut Berbisik",    setting: "Di dalam lorong kabut",    karakter: "Junior",    text: `Junior melangkah masuk. Kabut di sekelilingnya tebal banget — sampe ga keliatan tangan sendiri. Tapi yang bikin dia jalan terus...

Bisikan itu makin jelas.

"Juniooor... Akhirnya kamuuu..."
"Udah lama aku nunggu... Laaama..."

Junior mundur setapak. "S-siapa kamu?!"

Kabut di depannya berputar, kayak pusaran kecil. Terus dari dalam pusaran itu, muncul BAYANGAN. Samar-samar bentuknya kayak orang.

"Kamu ga inget aku, Junior?" suaranya berubah. Dari bisik, jadi suara yang... familiar.

Banget.

Junior nelen ludah. "Itu... suara..."`,    isEnd: false,    choices: [      {target: "scene4", text: "Junior berusaha ingat siapa pemilik suara itu"}    ]  },  "scene3b": {    title: "Jalan Pulang Tertutup Kabut",    setting: "Pinggir kampung, mulai gelap",    karakter: "Junior (dan David kalo lewat 2B)",    text: `Junior muter badan mau lari — tapi ga bisa.

Kabut udah nutup jalan pulang. Ga cuma di depan, tapi di semua arah. Kampungnya sekarang DIKEPUNG kabut tebal. Kayak benteng putih raksasa yang nutup seluruh desa.

Suara bisik-bisik mulai dateng dari segala penjuru. Pelan, tapi makin lama makin keras:

"Kembaliiii..."
"Juniorrr... kembaliiii..."
"Ini rumahmuuuu..."

Junior megang kepala. Suara itu terasa familiar. Kayak pernah denger. Tapi dari mana?

Bisikan itu ngenalin namanya dengan cara yang cuma orang TERDEKAT yang tau.`,    isEnd: false,    choices: [      {target: "scene4", text: "Junior berusaha ingat — siapa pemilik suara itu?"}    ]  },  "scene4": {    title: "Junior & Kabut — Rahasia Terungkap (TWIST!)",    setting: "Dalam kabut, antara dunia nyata dan... sesuatu yang lain",    karakter: "Junior, Bayangan misterius",    text: `**`,    isEnd: false,    choices: [      {target: "scene5a", text: "Junior percaya & ngikutin bisikan kakaknya"},      {target: "scene5b", text: "Junior nolak & kabur — ini ga masuk akal!"}    ]  },  "scene5a": {    title: "Junior Percaya",    setting: "Dalam kabut, bersama kakaknya Senior",    karakter: "Junior, Senior (arwah kakak)",    text: `Junior napas dalam. "Oke, Kak. Aku percaya. Terus... yang harus aku lakuin apa?"

Senior nghela napas. Kabut di sekelilingnya bergetar. "Aku butuh bantuan kamu, Jun. Jiwa aku ga bisa tenang di sini. Nyangkut di antara dua dunia. Karena... pas aku jatuh dulu, aku ga sendirian."

Junior merinding. "Maksud Kakak?"

"Ada sesuatu di gunung ini. Kekuatan kuno. Yang ngunci jiwa orang-orang yang mati di sini. Kabut ini bukan kabut biasa — ini penjara buat arwah. Dan aku butuh kamu buat... ngelupasin aku."

"Caranya?"

Senior ngulurkan tangan. "Ikut aku. Ke puncak. Di sana ada batu besar. Batu penjara. Kalo kamu pecahin... aku bebas."

Kabut mulai berputar-putar di sekeliling mereka. Angin dingin berhembus kencang.`,    isEnd: false,    choices: [      {target: "scene6a", text: "Junior pegang tangan kakaknya dan ikut ke puncak"}    ]  },  "scene5b": {    title: "Junior Kabur",    setting: "Dalam kabut, Junior mundur perlahan",    karakter: "Junior, Senior (arwah kakak)",    text: `Junior goyangin kepala. "Nggak. Nggak... ini ga mungkin. Kakak udah mati. Orang mati ga bisa balik!"

Senior mukanya sedih. "Jun..."

"AKU PULANG!" teriak Junior, lalu muter badan dan lari.

Tapi kabut di sekelilingnya makin tebal. Mau lari ke mana aja, yang keluar cuma putih semua. Ga ada jalan. Ga ada kampung. Ga ada apa-apa, kecuali suara kakaknya yang berbisik dari segala arah:

"Jun... jangan lari..."
"Kakak ga akan nyakitin kamu..."
"Kakak cuma butuh bantuan..."

Junior nutup kuping rapet-rapet. Tapi suara itu nyusup. Kayak langsung ke dalem kepala.

KABUT MULAI NGEJAR.`,    isEnd: false,    choices: [      {target: "scene6b", text: "Junior terus lari... atau berhenti dan hadapin?"}    ]  },  "scene6a": {    title: "Bebas! 🏁 (Ending A)",    setting: "Puncak gunung, di depan batu besar hitam",    karakter: "Junior, Senior (arwah kakak)",    text: `Junior dan kakaknya naik ke puncak. Dingin banget. Tapi ada batu hitam besar di tengah-tengah — dari batu itu kabut putih terus keluar kayak asap.

"Ini dia," kata Senior. "Batu penjara."

Junior melihat batu itu. Ada ukiran aneh di permukaannya, seperti tulisan kuno. Tanpa mikir panjang, Junior mengangkat batu di dekatnya dan memukul batu hitam itu.

BRAK!

Batu hitam itu retak, cahaya terang menyembur dari celah-celahnya. Kabut di sekeliling mereka mulai menghilang kehisap ke dalam retakan.

Senior mulai bersinar, kakinya perlahan berubah jadi titik-titik cahaya.

"Kak!" teriak Junior.

Senior menyeringai, matanya berkaca-kaca, "Makasih, Jun. Kamu berhasil."

"Kakak mau ke mana?!"

"Tenang aja, Kakak sekarang beneran bebas." ... "Jaga diri kamu adek ku dan ingat kalo suatu saat kamu butuh kakak kamu tau di mana mencari kakak."

Senior menghilang, kabut menghilang total dari kampung, orang-orang melihat puncak gunung bersinar terang seperti bintang jatuh.

Junior berdiri di puncak sendirian, menangis tapi juga senyum.

Di langit, satu bintang bersinar lebih terang dari yang lain. Kedip-kedip, Junior tau itu kakaknya.

🏁 **END — KAKAK BEBAS** 💫`,    isEnd: false,    choices: [    ]  },  "scene6b": {    title: "Terjebak Selamanya 🏁 (Ending B)",    setting: "Dalam kabut — ruang kosong tanpa ujung",    karakter: "Junior, Senior (arwah kakak)",    text: `Junior berlari, kakinya terasa mau copot. Tapi kabut di depan, belakang, kiri, kanan sama saja.

Akhirnya dia berhenti, napasnya tersengal, jantungnya mau meledak.

"Sudah..." bisik Senior, muncul dari balik kabut wajahnya sedih. "Jun, kalo kamu terus lari kamu ga akan menemukan jalan keluar."

Junior duduk lemas, air mata menetes. "Aku takut Kak..."
 
Senior duduk di sampingnya, kabut di sekitar mereka mulai tenang. "Kakak tau maaf kakak ga maksa kamu cuma ini satu-satunya cara kakak ketemu kamu lagi."

Junior menengok ke kakaknya, "terus sekarang gimana?"

Senior melihat ke langit yang di dalam kabut cuma putih semua, "kita tunggu."

"Tunggu apa?"

"Sampe kamu siap."

Kampung tidak pernah melihat Junior lagi. Kabut bertahan 3 hari, lalu hilang. Tapi beberapa orang bilang, kalo malem-malem di pinggir gunung kadang kedengeran suara dua anak kecil ketawa, ngobrol, di antara kabut tipis yang turun.

🥲 **END — TERJEBAK BERSAMA** 🌫️`,    isEnd: false,    choices: [    ]  }};

let currentScene = "scene1";

function goTo(sceneId) {
  const scene = story[sceneId];
  if (!scene) return;
  currentScene = sceneId;

  const container = document.getElementById("sceneContainer");
  let div = document.getElementById("scene-" + sceneId);
  if (!div) {
    div = document.createElement("div");
    div.className = "scene";
    div.id = "scene-" + sceneId;
    container.appendChild(div);
  }

  let meta = [];
  if (scene.setting) meta.push("📍 " + esc(scene.setting));
  if (scene.karakter) meta.push("👤 " + esc(scene.karakter));

  let html = '<div class="scene-title">' + esc(scene.title) + '</div>';
  if (meta.length) html += '<div class="scene-meta">' + meta.join(" | ") + '</div>';

  // Format narrative: bold, italic, paragraphs
  let narr = scene.text;
  narr = narr.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  narr = narr.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html += '<div class="narrative">' +
    narr.split("\n\n").map(p => '<p>' + esc(p).replace(/\n/g, "<br>") + '</p>').join("") +
    '</div>';

  if (scene.isEnd) {
    html += '<div class="ending-badge">🏁 THE END</div>';
  }

  // Auto-advance for merge scenes
  if (scene.autoChoice && scene.choices.length > 0) {
    setTimeout(function() { goTo(scene.choices[0].target); }, 2500);
    // Still show a brief indicator
    html += '<p style="color:#666;font-style:italic;text-align:center;margin-top:20px">⟳ Melanjutkan...</p>';
  } else if (scene.choices.length > 0) {
    html += '<div class="choices">';
    for (let c of scene.choices) {
      html += '<button class="choice-btn" data-goto="' + c.target + '">';
      html += '<span class="arrow">➤</span> ' + esc(c.text);
      html += '</button>';
    }
    html += '</div>';
  }

  if (scene.isEnd) {
    html += '<div style="text-align:center"><button class="restart-btn" data-goto="restart">⟳ Main Lagi</button></div>';
  }

  div.innerHTML = html;

  document.querySelectorAll(".scene").forEach(el => el.classList.remove("active"));
  div.classList.add("active");
  div.style.animation = "none";
  void div.offsetHeight;
  div.style.animation = "fadeIn 0.6s ease";

  const idx = SCENES.indexOf(sceneId) + 1;
  document.getElementById("sceneCounter").textContent = "Scene " + idx + " of " + SCENES.length;
  window.scrollTo({top:0,behavior:"smooth"});
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Event delegation
document.addEventListener("click", function(e) {
  let el = e.target;
  while (el && el !== document) {
    const g = el.getAttribute && el.getAttribute("data-goto");
    if (g === "restart") { goTo("scene1"); return; }
    if (g) { goTo(g); return; }
    el = el.parentNode;
  }
});

goTo("scene1");
</script>
</body>
</html>
