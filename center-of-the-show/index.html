<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Interaktif</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:700px;width:100%;margin:0 auto}
.header{text-align:center;margin-bottom:30px;opacity:.8}
.header h1{font-size:2em;background:linear-gradient(135deg,#ff6b6b,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .scene-counter{color:#888;font-size:.9em;margin-top:5px}
.scene{display:none;animation:fadeIn .6s ease}
.scene.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scene-title{font-size:1.5em;margin-bottom:5px;color:#c084fc}
.scene-meta{font-size:.85em;color:#888;margin-bottom:20px;font-style:italic}
.narrative{font-size:1.1em;line-height:1.8;margin-bottom:30px;white-space:pre-wrap}
.narrative p{margin-bottom:15px}
.ending-badge{display:inline-block;background:linear-gradient(135deg,#ff6b6b,#c084fc);color:#fff;padding:8px 20px;border-radius:20px;font-weight:bold;margin-top:20px;font-size:.9em}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.choice-btn{background:linear-gradient(135deg,#1a1a3a,#1a1a4a);color:#fff;border:1px solid #333;padding:16px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;text-align:left;width:100%;font-family:inherit}
.choice-btn:hover{background:linear-gradient(135deg,#2a2a5a,#2a2a6a);border-color:#c084fc;transform:translateY(-2px);box-shadow:0 5px 20px rgba(192,132,252,.2)}
.choice-btn .arrow{color:#c084fc;margin-right:10px}
.restart-btn{background:transparent;color:#c084fc;border:1px solid #c084fc;padding:12px 24px;border-radius:12px;cursor:pointer;font-size:1em;transition:all .3s ease;margin-top:20px;font-family:inherit}
.restart-btn:hover{background:rgba(192,132,252,.1);transform:translateY(-2px)}
@media(max-width:500px){.narrative{font-size:1em}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>Cerita Interaktif</h1>
    <div class="scene-counter" id="sceneCounter"></div>
  </div>
  <div id="sceneContainer"></div>
</div>
<script>
const SCENES = ["scene1","scene2a","scene2b"];
const story = {
  "scene1": {    title: "Pesan dari kakak",    setting: "Kamar Sena — sore hari, sinar jingga masuk lewat jendela. Kotor, berantakan, tisu bekas di mana-mana.",    karakter: "Sena",    text: `# Scene 1: Pesan dari kakak
 


Sudah tiga hari sejak kakakku menghilang. Polisi bilang mereka masih "menyelidiki", tapi aku tahu artinya: mereka tidak punya petunjuk. Aku hanya bisa berbaring di tempat tidur, memandangi langit-langit kamar yang mulai gelap.

Tiba-tiba, HP-ku bergetar. Sebuah notifikasi dari.. kakak?

Aku buka pesan itu. Satu kalimat pendek:
 
"Sena, kakak lupa. Kakak tuh kenapa bisa hilang?"

Aku diam. Membaca ulang. Pertanyaan itu aneh — masa orang yang hilang nanya kenapa dia hilang? Tapi semakin lama aku mikir, semakin aku sadar sesuatu:

Aku sendiri juga gak tahu. Polisi bilang "menghilang", tapi mereka gak pernah bilang gimana caranya. Dan aku... aku gak pernah nanya. Dokter bilang aku kaget, trauma. Tapi sekarang, dipikir-pikir...
Kenapa aku gak nanya?
 
Kenapa tiga hari ini aku cuma di kamar, gak nyari kakak, gak ngehubungin temen-temennya, gak ngecek sosial medianya?
 
Aku buka galeri HP. Foto terakhir yang aku ambil... tiga hari yang lalu. Sebuah selfie. Aku tersenyum. Di latar belakang, kakak lagi duduk di meja makan, minum kopi, santai.
Itu adalah hari kakak dinyatakan hilang.
 
Dan di foto itu... kakak kelihatan baik-baik aja.`,    isEnd: false,    choices: [      {target: "scene2a", text: "Membalas pesan kakak — coba cari tahu lebih banyak lewat HP"},      {target: "scene2b", text: "Keluar kamar dan mulai mencari sendiri — ada sesuatu yang gak beres"}    ]  },  "scene2a": {    title: "Membalas pesan kakak",    setting: "Masih di Kamar Sena — sore hari, sinar jingga masuk lewat jendela. Kotor, berantakan, tisu bekas di mana-mana.",    karakter: "Sena",    text: `Aku buka pesan itu. Mikir keras. Akhirnya cuma ngetik:

"Kak, lo di mana?"

Tiga titik muncul di layar. Dia lagi ngetik. Jantungku berdegup kencang.

Tapi centang cuma satu. Pesanku gak terkirim. Sinyal penuh, tapi gak bisa kirim. Aneh.

Balasan kakak masuk:

"Gak usah cari aku, Sen. Lo cari aja ingatan lo yang ilang."

Ingatan? Maksudnya apa? Aku bingung. Mau nanya lagi, tapi tiga titik itu muncul lalu hilang. Gak ada balasan lagi.

Aku cek nomor pengirim. Itu bener nomor kakak. Tapi foto profilnya bukan foto kakak — foto kamar kosong. Kamarku. Diambil dari sudut pintu.`,    isEnd: false,    choices: [      {target: "scene3a", text: "Cek galeri HP — mungkin ada foto lain yang bisa jelasin"},      {target: "scene3b", text: "Coba telpon nomor kakak — dengar suaranya langsung"}    ]  },  "scene2b": {    title: "Keluar kamar dan mulai mencari sendiri",    setting: "Rumah Sena — lorong gelap menuju kamar kakak. Sore hari, hampir magrib. Rumah terasa kosong. Kamar kakak rapih.",    karakter: "Sena",    text: `Aku bangkit dari tempat tidur. Pertama kalinya dalam tiga hari aku berdiri. Kakiku lemas, tapi aku paksa jalan.

Pintu kamar kakak terbuka. Di dalam, tempat tidurnya rapi. Seprai halus, bantal diatur. Kakak gak pernah serapi ini.

Lemari kakak kosong. Semua baju masih ada. Gak ada yang dibawa. Kalo dia pergi, pasti bawa baju. Kecuali... dia gak pergi sendiri.

Di dasar lemari, nyangkut amplop putih. Namaku di atasnya. Tulisan kakak — huruf S melingkar kayak ular.

Aku buka. Isinya cuma satu kalimat:

"Sena, cari buku harianku. Tapi jangan baca halaman terakhir."`,    isEnd: false,    choices: [      {target: "scene4a", text: "Cari buku harian kakak — mulai dari kamarnya"},      {target: "scene4b", text: "Cek kamar sendiri dulu — mungkin ada petunjuk yang selama ini gak disadari"}    ]  }};

let currentScene = "scene1";

function goTo(sceneId) {
  const scene = story[sceneId];
  if (!scene) return;
  currentScene = sceneId;

  const container = document.getElementById("sceneContainer");
  let div = document.getElementById("scene-" + sceneId);
  if (!div) {
    div = document.createElement("div");
    div.className = "scene";
    div.id = "scene-" + sceneId;
    container.appendChild(div);
  }

  let meta = [];
  if (scene.setting) meta.push("📍 " + esc(scene.setting));
  if (scene.karakter) meta.push("👤 " + esc(scene.karakter));

  let html = '<div class="scene-title">' + esc(scene.title) + '</div>';
  if (meta.length) html += '<div class="scene-meta">' + meta.join(" | ") + '</div>';

  // Format narrative: bold, italic, paragraphs
  let narr = scene.text;
  narr = narr.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  narr = narr.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html += '<div class="narrative">' +
    narr.split("\n\n").map(p => '<p>' + esc(p).replace(/\n/g, "<br>") + '</p>').join("") +
    '</div>';

  if (scene.isEnd) {
    html += '<div class="ending-badge">🏁 THE END</div>';
  }

  // Auto-advance for merge scenes
  if (scene.autoChoice && scene.choices.length > 0) {
    setTimeout(function() { goTo(scene.choices[0].target); }, 2500);
    // Still show a brief indicator
    html += '<p style="color:#666;font-style:italic;text-align:center;margin-top:20px">⟳ Melanjutkan...</p>';
  } else if (scene.choices.length > 0) {
    html += '<div class="choices">';
    for (let c of scene.choices) {
      html += '<button class="choice-btn" data-goto="' + c.target + '">';
      html += '<span class="arrow">➤</span> ' + esc(c.text);
      html += '</button>';
    }
    html += '</div>';
  }

  if (scene.isEnd) {
    html += '<div style="text-align:center"><button class="restart-btn" data-goto="restart">⟳ Main Lagi</button></div>';
  }

  div.innerHTML = html;

  document.querySelectorAll(".scene").forEach(el => el.classList.remove("active"));
  div.classList.add("active");
  div.style.animation = "none";
  void div.offsetHeight;
  div.style.animation = "fadeIn 0.6s ease";

  const idx = SCENES.indexOf(sceneId) + 1;
  document.getElementById("sceneCounter").textContent = "Scene " + idx + " of " + SCENES.length;
  window.scrollTo({top:0,behavior:"smooth"});
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Event delegation
document.addEventListener("click", function(e) {
  let el = e.target;
  while (el && el !== document) {
    const g = el.getAttribute && el.getAttribute("data-goto");
    if (g === "restart") { goTo("scene1"); return; }
    if (g) { goTo(g); return; }
    el = el.parentNode;
  }
});

goTo("scene1");
</script>
</body>
</html>
