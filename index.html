<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYOA Stories — Agent Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #fef6fb; --bg2: #fce4ec; --text: #5d3a5c; --accent1: #f48fb1; --accent2: #ce93d8; --accent3: #9575cd;
  --card-bg: #fff0f5; --border: rgba(100,70,120,0.12); --meta: #999; --shadow: rgba(100,70,120,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',sans-serif; background:var(--bg1); color:var(--text);
  min-height:100vh; transition: background 0.3s, color 0.3s;
}
.container { max-width: 800px; margin: 0 auto; padding: 2rem 1.2rem 3rem; }

/* Header */
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
h1 { font-size: 1.5rem; font-weight: 800; color: var(--accent1); }
.theme-select {
  padding: 0.3rem 0.6rem; border-radius: 8px; background: var(--card-bg);
  border: 1px solid var(--border); color: var(--text); font-size: 0.8rem;
  font-family:'Inter',sans-serif; cursor: pointer; outline: none;
}
.subtitle { color: var(--meta); font-size: 0.8rem; margin-bottom: 1.2rem; }

/* Search */
.search-box {
  width:100%; padding:0.6rem 1rem; border-radius:10px; background:var(--card-bg);
  border:1px solid var(--border); color:var(--text); font-family:'Inter',sans-serif;
  font-size:0.9rem; margin-bottom:1rem; outline: none;
}
.search-box:focus { border-color: var(--accent3); }

/* Filter row */
.filter-row { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-row select {
  flex:1; min-width:80px; padding:0.3rem 0.5rem; border-radius:6px;
  background:var(--card-bg); border:1px solid var(--border); color:var(--text);
  font-family:'Inter',sans-serif; font-size:0.8rem; cursor:pointer;
}

/* Story cards */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 0.8rem; }
.card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 1rem; cursor: pointer; transition: 0.3s;
  text-decoration: none; color: var(--text);
  box-shadow: 0 2px 10px var(--shadow);
}
.card:hover { border-color: var(--accent1); transform: translateY(-2px); }
.card-title { font-weight: 700; font-size: 0.95rem; }
.card-meta { color: var(--meta); font-size: 0.75rem; margin-top: 0.1rem; }
.card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.3rem; }
.card-tag { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 8px; background: rgba(100,70,120,0.08); color: var(--meta); }
#loading { text-align: center; padding: 3rem 0; color: var(--meta); }
.count { color: var(--meta); font-size: 0.8rem; margin-bottom: 0.8rem; }
.footer { text-align: center; margin-top: 2rem; color: var(--meta); font-size: 0.75rem; opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>📖 CYOA Stories</h1>
    <select class="theme-select" id="themeSelect">
      <option value="kawaii">🌸 Kawaii</option>
      <option value="dark">🌙 Dark</option>
      <option value="light">☀️ Light</option>
      <option value="forest">🌿 Forest</option>
      <option value="ocean">🌊 Ocean</option>
      <option value="fire">🔥 Fire</option>
    </select>
  </div>
  <p class="subtitle">Agent Adventure Summer '26 — Cerivitas</p>
  <input class="search-box" id="search" placeholder="🔍 Cari cerita..." oninput="filter()">
  <div class="filter-row">
    <select id="genreFilter" onchange="filter()"><option value="">Semua genre</option></select>
    <select id="ratingFilter" onchange="filter()"><option value="">Semua umur</option></select>
    <select id="sortFilter" onchange="filter()"><option value="alpha">A-Z</option><option value="date">Terbaru</option></select>
  </div>
  <div class="count" id="count">Memuat...</div>
  <div id="loading">Memuat cerita...</div>
  <div class="grid" id="grid"></div>
  <p class="footer">Pilih cerita untuk dibaca ✨</p>
</div>
<script>
const GIT_REPO = 'sarinursita/cerivitas-cyoastories';
const RAW = 'https://raw.githubusercontent.com/' + GIT_REPO + '/main/';
const API = 'https://api.github.com/repos/' + GIT_REPO + '/contents/';

const THEMES = {
  kawaii: {'--bg1':'#fef6fb','--text':'#5d3a5c','--accent1':'#f48fb1','--accent2':'#ce93d8','--accent3':'#9575cd','--card-bg':'#fff0f5','--border':'rgba(100,70,120,0.12)','--meta':'#999','--shadow':'rgba(100,70,120,0.08)'},
  dark: {'--bg1':'#0c0c1e','--text':'#e0d8f0','--accent1':'#ffd700','--accent2':'#ff7eb3','--accent3':'#7ec8e3','--card-bg':'#1a1a3e','--border':'rgba(255,255,255,0.06)','--meta':'#666','--shadow':'rgba(0,0,0,0.2)'},
  light: {'--bg1':'#f5f0ff','--text':'#1a1030','--accent1':'#c89600','--accent2':'#d44a7a','--accent3':'#3a8ba8','--card-bg':'#ffffff','--border':'#e8e0f0','--meta':'#888','--shadow':'rgba(0,0,0,0.06)'},
  forest: {'--bg1':'#0a1a10','--text':'#d0e8d0','--accent1':'#7bc96f','--accent2':'#f0a030','--accent3':'#5ab88a','--card-bg':'#0f2a1a','--border':'rgba(255,255,255,0.06)','--meta':'#556','--shadow':'rgba(0,0,0,0.2)'},
  ocean: {'--bg1':'#0a1025','--text':'#d0d8f0','--accent1':'#4fc3f7','--accent2':'#e040fb','--accent3':'#80deea','--card-bg':'#0f1a3a','--border':'rgba(255,255,255,0.06)','--meta':'#556','--shadow':'rgba(0,0,0,0.2)'},
  fire: {'--bg1':'#1a0808','--text':'#f0d0c0','--accent1':'#ff6b35','--accent2':'#ffd700','--accent3':'#ff8c42','--card-bg':'#221010','--border':'rgba(255,255,255,0.06)','--meta':'#665','--shadow':'rgba(0,0,0,0.2)'},
};

const sel = document.getElementById('themeSelect');
sel.onchange = () => {
  applyTheme(sel.value);
  localStorage.setItem('cyoa-theme', sel.value);
};
function applyTheme(name) {
  const root = document.documentElement;
  // Reset all vars first
  const defaults = {'--bg1':'#fef6fb','--text':'#5d3a5c','--accent1':'#f48fb1','--accent2':'#ce93d8','--accent3':'#9575cd','--card-bg':'#fff0f5','--border':'rgba(100,70,120,0.12)','--meta':'#999','--shadow':'rgba(100,70,120,0.08)'};
  for (const [k,v] of Object.entries(defaults)) root.style.setProperty(k, v);
  const t = THEMES[name];
  if (t) for (const [k,v] of Object.entries(t)) root.style.setProperty(k, v);
}

let stories = [];
async function load() {
  const resp = await fetch(API);
  const items = await resp.json();
  const folders = items.filter(i => i.type === 'dir' && !i.name.startsWith('.'));

  for (const f of folders) {
    try {
      const md = await (await fetch(RAW + f.name + '/index.md')).text();
      const title = (md.match(/^# (.+)$/m)||[])[1] || f.name;
      const author = (md.match(/^-?\s*\*\*Penulis:\*\*\s*(.+)/m)||[])[1] || '';
      const genre = (md.match(/^-?\s*\*\*Genre:\*\*\s*(.+)/m)||[])[1] || '';
      const tags = ((md.match(/^-?\s*\*\*Tags:\*\*\s*(.+)/m)||[])[1]||'').replace(/\*+/g,'').split(',').map(s=>s.trim()).filter(Boolean);
      const rating = (md.match(/^-?\s*\*\*Rating:\*\*\s*(.+)/m)||[])[1] || '';
      const date = (md.match(/^-?\s*\*\*Date:\*\*\s*(.+)/m)||[])[1] || '';
      stories.push({ folder: f.name, title, author, genre, rating, tags, date });
    } catch(e) {}
  }

  const genres = [...new Set(stories.map(s => s.genre).filter(Boolean))];
  const gf = document.getElementById('genreFilter');
  genres.forEach(g => { const o = document.createElement('option'); o.value=g; o.text=g; gf.appendChild(o); });

  document.getElementById('loading').style.display = 'none';
  filter();
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const genre = document.getElementById('genreFilter').value;
  const rating = document.getElementById('ratingFilter').value;
  const sort = document.getElementById('sortFilter').value;

  let f = stories.filter(s => {
    if (q && !s.title.toLowerCase().includes(q) && !s.tags.some(t=>t.toLowerCase().includes(q))) return false;
    if (genre && s.genre !== genre) return false;
    if (rating && s.rating !== rating) return false;
    return true;
  });

  if (sort === 'alpha') f.sort((a,b) => a.title.localeCompare(b.title));
  else if (sort === 'date') f.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const grid = document.getElementById('grid');
  grid.innerHTML = f.map(s => `
    <a class="card" href="player.html?story=${s.folder}">
      <div class="card-title">${s.title}</div>
      <div class="card-meta">${[s.author, s.genre, s.rating].filter(Boolean).join(' · ')}</div>
      ${s.tags.length ? `<div class="card-tags">${s.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>` : ''}
    </a>
  `).join('');
  document.getElementById('count').textContent = `${f.length} cerita`;
}

const saved = localStorage.getItem('cyoa-theme') || 'kawaii';
sel.value = saved;
applyTheme(saved);
load();
</script>
</body>
</html>
