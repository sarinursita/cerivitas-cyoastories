const letters = ['A', 'B', 'C', 'D', 'E'];

function showTitleScreen() {
  const html = `
    <div class="scene title-screen fade-in">
      <h1>Mata Ketiga</h1>
      <div class="subtitle">Sebuah Cerita Interaktif</div>
      <div class="genre">👻 Horor · 🧠 Psikologis · 😂 Komedi · 🕵️ Misteri</div>
      <button class="start-btn" onclick="goTo('01')">▶ Mulai Cerita</button>
      <div class="poem">
        "Kadang, teman yang paling nyata<br>
        adalah yang lahir dari pikiran sendiri."
      </div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

function goTo(sceneId) {
  if (sceneId === 'restart') {
    showTitleScreen();
    return;
  }

  const scene = story[sceneId];
  if (!scene) {
    document.getElementById('content').innerHTML = '<div class="scene"><p>Scene belum tersedia.</p><button class="restart-btn" onclick="goTo(\'restart\')">🔄 Kembali</button></div>';
    return;
  }

  let html = '<div class="scene fade-in">';
  html += '<div class="scene-number">✦ Scene ' + sceneId + '</div>';
  html += '<div class="scene-title">' + scene.title + '</div>';

  let meta = '';
  if (scene.setting) meta += '<span>📍 ' + scene.setting + '</span>';
  if (scene.chars) meta += '<span>👤 ' + scene.chars + '</span>';
  if (meta) html += '<div class="scene-meta">' + meta + '</div>';

  let narr = scene.narrative;
  narr = narr.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  narr = narr.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html += '<div class="narrative">' + narr.split('\n\n').join('</p><p>').replace(/\n/g, '<br>') + '</div>';

  if (scene.is_ending) {
    let badgeClass = scene.ending_type === 'good' ? 'ending-good' : 'ending-mystery';
    html += '<div class="ending-badge ' + badgeClass + '">' + (scene.ending_label || '🏁 THE END') + '</div>';
    html += '<div style="text-align:center"><button class="restart-btn" onclick="goTo(\'restart\')">🔄 Main Lagi dari Awal</button></div>';
  } else if (scene.choices.length > 0) {
    html += '<hr><div class="choices-label">— Pilihan —</div><div class="choices">';
    scene.choices.forEach((choice, i) => {
      let label = letters[i] || (i + 1);
      html += '<button class="choice-btn" onclick="goTo(\'' + choice.target + '\')"><span class="choice-num">' + label + '</span>' + choice.desc + '</button>';
    });
    html += '</div>';
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Start
showTitleScreen();
</script>
</body>
</html>
