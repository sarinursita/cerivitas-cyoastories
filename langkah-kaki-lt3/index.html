<!DOCTYPE html>

    * { margin: 0; padding: 0; box-sizing: border-box; }

      display: flex;

    }
    .container {
      max-width: 720px;
      width: 100%;
      padding: 30px 20px;

      display: flex;

    }
    .header {
      text-align: center;

    }
    .scene-title {
      font-size: 1.4em;
      font-weight: 700;
      color: #ffcc66;
      margin-bottom: 6px;
    }
    .scene-setting {

    }

      flex-direction: column;

    .choice-btn {

      border: 1px solid #3a3a6a;
      padding: 16px 24px;

      transition: all 0.3s;
      font-size: 1em;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .choice-btn:hover {
      background: linear-gradient(135deg, #2a2a6a, #2a2a5a);
      border-color: #6a6aaa;
      transform: translateX(6px);
    }
    .choice-btn:active {

    }
    .choice-letter {

      height: 32px;

      align-items: center;
      justify-content: center;

    }
    .restart-btn {
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85em;
      margin-top: 25px;

      text-align: center;

      width: fit-content;
    }
    .restart-btn:hover {
      color: #ffcc66;
      border-color: #ffcc66;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8em;
      color: #444;
    }
    .footer span {
      color: #666;
    }

    /* BG particles effect */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.08;
      pointer-events: none;

    .bg-orb-1 { width: 500px; height: 500px; background: #4444ff; top: -200px; left: -200px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #aa44ff; bottom: -150px; right: -150px; }
    .bg-orb-3 { width: 300px; height: 300px; background: #ff6644; top: 50%; left: 50%; }

    }
    @keyframes twistPulse {

      100% { box-shadow: 0 0 0 0 rgba(255, 100, 50, 0); }
    }
    .twist-text {
      color: #ff8844;

      font-size: 1.1em;
    }

    @media (max-width: 500px) {

  </style>
</head>

        text: `<p>Suasana setelah acara ekskul selesai. Meja dan kursi masih berantakan. Pika dan Chu jadi panitia, jadi mereka berdua yang beberes paling akhir.</p>

        text: `<p>"Tangga darurat aja, biar kita bisa ngintip dulu dari samping," usul Chu.</p>

        <p>Pintunya besi, agak berkarat di bagian engselnya. Dari celah pintu, mereka bisa dengar suara kayak... gerakan. Atau napas.</p>

        <p><em>Kruk... kruk... kruk...</em></p>

        <p>"Chu... ini apaan?" bisik Pika.</p>
        <p>Chu memunguti kertas-kertas di lantai. Matanya membelalak.</p>

        text: `<p>"Gue jaga sini udah 15 tahun," mulai Pak Hendra, nyeruput kopinya. "Dan selama 15 tahun itu... suara dari lantai 3 gak pernah berhenti."</p>

    function goTo(sceneId) {
      const scene = story[sceneId];
      if (!scene) return;

      const container = document.getElementById('sceneContent');
      const card = document.getElementById('sceneCard');

      // Update counter
      document.getElementById('sceneCounter').textContent = `Scene ${scene.number} of 7`;

      // Flash effect for twist scenes
      if (scene.isTwist) {
        card.classList.add('twist-flash');
        setTimeout(() => card.classList.remove('twist-flash'), 1200);
      }

      // Build HTML
      let html = `<div class="scene-title">${scene.title}</div>`;
      html += `<div class="scene-setting">📍 ${scene.setting}</div>`;
      html += `<div class="scene-text">${scene.text}</div>`;

      if (scene.choices && scene.choices.length > 0) {
        html += `<div class="divider">— ◆ —</div>`;
        html += `<div class="choices-label">📌 PILIHAN</div>`;
        html += `<div class="choices">`;
        scene.choices.forEach((choice, i) => {
          const letters = ['A', 'B', 'C', 'D'];
          const letter = choice.letter || letters[i];
          html += `<button class="choice-btn" onclick="goTo('${choice.next}')">
            <span class="choice-letter">${letter}</span>
            <span>${choice.text}</span>
          </button>`;
        });
        html += `</div>`;
      } else if (scene.isEnding) {
        html += `<div style="text-align:center; margin-top:20px;">
          <button class="restart-btn" onclick="goTo('scene1')" style="color:#ffcc66; border-color:#ffcc66; padding:12px 30px; font-size:1em;">
            🔄 Main Lagi
          </button>
        </div>`;
      }

      container.innerHTML = html;

      // Re-trigger animation
      card.style.animation = 'none';
      void card.offsetHeight;
      card.style.animation = 'fadeSlideIn 0.6s ease-out';

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Start the story!
    goTo('scene1');
  </script>
</body>
</html>
