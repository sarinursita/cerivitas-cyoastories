  html += '<div class="scene-title">' + s.title + '</div>';
  html += '<div class="scene-narrative">' + s.narrative + '</div>';
  
  if (s.ending) {
    html += '<div class="ending">';
    html += '<div class="ending-badge">\u274C THE END</div>';
    html += '<br><button class="restart-btn" onclick="renderScene(\'scene-1\')">\uD83D\uDD04 Main Lagi</button>';
    html += '</div>';
  }
  if (s.choices && s.choices.length > 0) {
    html += '<div class="choices">';
    for (var i = 0; i < s.choices.length; i++) {
      var c = s.choices[i];
      html += '<button class="choice-btn" onclick="renderScene(\'' + c.next + '\')">' + c.text + ' <span class="arrow">\u2192</span></button>';
    }
    html += '</div>';
  }
  
  html += '</div>';
  content.innerHTML = html;
}
